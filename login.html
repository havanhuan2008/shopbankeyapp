<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng Nhập - Shophuanha.VN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Rubik',sans-serif;min-height:100vh;overflow:hidden;}
    @keyframes rainbow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
    @keyframes bgShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
    @keyframes slideUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
    @keyframes particleFloat{0%{transform:translateY(0) rotate(0deg);opacity:0.6;}100%{transform:translateY(-100vh) rotate(720deg);opacity:0;}}

    .bg-wrap{
      position:fixed;inset:0;z-index:0;
      background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#0f3460,#1a1a2e);
      background-size:400% 400%;
      animation:bgShift 8s ease infinite;
      overflow:hidden;
    }
    .particle{
      position:absolute;border-radius:50%;
      animation:particleFloat linear infinite;
      pointer-events:none;
    }
    .page{
      position:relative;z-index:1;min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:20px;overflow-y:auto;
    }
    .logo-area{text-align:center;margin-bottom:28px;animation:slideUp 0.5s ease;}
    .logo-main{
      font-family:'Righteous',cursive;font-size:32px;font-weight:900;
      background:linear-gradient(90deg,#ff0080,#ff6a00,#ffd700,#00c853,#2196f3,#9c27b0,#ff0080);
      background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:rainbow 3s ease infinite, float 3s ease-in-out infinite;
      letter-spacing:1px;
    }
    .logo-sub{color:rgba(255,255,255,0.5);font-size:13px;margin-top:6px;}

    .card{
      background:rgba(255,255,255,0.97);
      border-radius:24px;width:100%;max-width:400px;
      box-shadow:0 24px 80px rgba(0,0,0,0.4);
      overflow:hidden;animation:slideUp 0.5s ease 0.1s both;
    }
    .card-tabs{display:flex;background:#f8f9fa;border-bottom:2px solid #eee;}
    .tab-btn{
      flex:1;padding:15px 10px;border:none;background:transparent;
      font-size:15px;font-weight:700;color:#bbb;cursor:pointer;
      font-family:'Rubik',sans-serif;transition:all 0.25s;
      border-bottom:3px solid transparent;position:relative;
    }
    .tab-btn.active{color:#e94560;border-bottom-color:#e94560;background:#fff;}
    .card-body{padding:28px 24px;}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}

    .form-group{margin-bottom:18px;position:relative;}
    .form-label{display:block;font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
    .input-wrap{position:relative;}
    .form-input{
      width:100%;padding:13px 44px 13px 16px;
      border:2px solid #eef0f5;border-radius:13px;
      font-size:15px;font-family:'Rubik',sans-serif;
      outline:none;transition:all 0.25s;color:#333;
      background:#fafbff;
    }
    .form-input:focus{border-color:#e94560;background:#fff;box-shadow:0 0 0 3px rgba(233,69,96,0.08);}
    .input-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#ccc;font-size:16px;cursor:pointer;transition:color 0.2s;}
    .input-icon:hover{color:#e94560;}

    .btn-main{
      width:100%;padding:14px;
      background:linear-gradient(135deg,#e94560,#c0392b);
      color:#fff;border:none;border-radius:14px;
      font-size:16px;font-weight:700;cursor:pointer;
      font-family:'Rubik',sans-serif;margin-top:4px;
      transition:all 0.25s;
      box-shadow:0 6px 20px rgba(233,69,96,0.35);
    }
    .btn-main:hover{opacity:0.92;transform:translateY(-1px);box-shadow:0 8px 24px rgba(233,69,96,0.45);}
    .btn-main:active{transform:translateY(0);}

    .err-msg{
      display:none;align-items:center;gap:8px;
      background:#ffebee;border:1.5px solid #ffcdd2;
      border-radius:12px;padding:11px 14px;
      font-size:13px;color:#c62828;margin-top:10px;
    }
    .ok-msg{
      display:none;align-items:center;gap:8px;
      background:#e8f5e9;border:1.5px solid #c8e6c9;
      border-radius:12px;padding:11px 14px;
      font-size:13px;color:#1b5e20;margin-top:10px;
    }
    .form-footer{text-align:center;margin-top:16px;font-size:13px;color:#aaa;}
    .form-footer a{color:#e94560;text-decoration:none;font-weight:700;}
    .back-link{
      display:flex;align-items:center;gap:8px;
      color:rgba(255,255,255,0.5);text-decoration:none;
      font-size:13px;margin-top:20px;transition:color 0.2s;
      animation:slideUp 0.5s ease 0.2s both;
    }
    .back-link:hover{color:#fff;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .spin{animation:spin 0.8s linear infinite;}
  </style>
</head>
<body>
  <div class="bg-wrap" id="bgWrap"></div>
  <div class="page">
    <div class="logo-area">
      <div class="logo-main">Shophuanha.VN</div>
      <div class="logo-sub">Shop Key App Uy Tín #1 Việt Nam</div>
    </div>

    <div class="card">
      <div class="card-tabs">
        <button class="tab-btn active" onclick="switchTab('login')"><i class="fas fa-sign-in-alt" style="margin-right:6px;"></i>Đăng Nhập</button>
        <button class="tab-btn" onclick="switchTab('register')"><i class="fas fa-user-plus" style="margin-right:6px;"></i>Đăng Ký</button>
      </div>
      <div class="card-body">
        <!-- LOGIN -->
        <div class="tab-panel active" id="loginPanel">
          <div class="form-group">
            <label class="form-label">Email / Tên đăng nhập</label>
            <div class="input-wrap">
              <input type="text" class="form-input" id="loginEmail" placeholder="Nhập email hoặc username"/>
              <i class="fas fa-envelope input-icon"></i>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Mật Khẩu</label>
            <div class="input-wrap">
              <input type="password" class="form-input" id="loginPwd" placeholder="Nhập mật khẩu"/>
              <i class="fas fa-eye input-icon" id="loginPwdToggle" onclick="togglePwd('loginPwd','loginPwdToggle')"></i>
            </div>
          </div>
          <div class="err-msg" id="loginErr"><i class="fas fa-exclamation-circle"></i><span></span></div>
          <div class="ok-msg" id="loginOk"><i class="fas fa-check-circle"></i><span></span></div>
          <button class="btn-main" id="loginBtn" onclick="doLogin()">
            <i class="fas fa-sign-in-alt" style="margin-right:8px;" id="loginBtnIcon"></i>Đăng Nhập
          </button>
          <div class="form-footer">Chưa có tài khoản? <a href="#" onclick="switchTab('register')">Đăng ký ngay</a></div>
        </div>

        <!-- REGISTER -->
        <div class="tab-panel" id="registerPanel">
          <div class="form-group">
            <label class="form-label">Họ và Tên</label>
            <div class="input-wrap">
              <input type="text" class="form-input" id="regName" placeholder="Nhập họ và tên"/>
              <i class="fas fa-user input-icon"></i>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <div class="input-wrap">
              <input type="email" class="form-input" id="regEmail" placeholder="Nhập địa chỉ email"/>
              <i class="fas fa-envelope input-icon"></i>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Mật Khẩu</label>
            <div class="input-wrap">
              <input type="password" class="form-input" id="regPwd" placeholder="Tối thiểu 6 ký tự"/>
              <i class="fas fa-eye input-icon" id="regPwdToggle" onclick="togglePwd('regPwd','regPwdToggle')"></i>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Xác Nhận Mật Khẩu</label>
            <div class="input-wrap">
              <input type="password" class="form-input" id="regConfirm" placeholder="Nhập lại mật khẩu"/>
              <i class="fas fa-lock input-icon"></i>
            </div>
          </div>
          <div class="err-msg" id="regErr"><i class="fas fa-exclamation-circle"></i><span></span></div>
          <div class="ok-msg" id="regOk"><i class="fas fa-check-circle"></i><span></span></div>
          <button class="btn-main" id="regBtn" onclick="doRegister()">
            <i class="fas fa-user-plus" style="margin-right:8px;"></i>Đăng Ký Ngay
          </button>
          <div class="form-footer">Đã có tài khoản? <a href="#" onclick="switchTab('login')">Đăng nhập</a></div>
        </div>
      </div>
    </div>
    <a href="web.html" class="back-link"><i class="fas fa-arrow-left"></i>Về trang chủ</a>
  </div>

  <script>
    // Firebase
    const firebaseConfig={apiKey: "AIzaSyCSC-b_f-F4WbjDaQIjrIwtvJdjawaccOk",
    authDomain: "aimlocksuperv2.firebaseapp.com",
    databaseURL: "https://aimlocksuperv2-default-rtdb.firebaseio.com",
    projectId: "aimlocksuperv2",
    storageBucket: "aimlocksuperv2.firebasestorage.app",
    messagingSenderId: "692606090999",
    appId: "1:692606090999:web:1444aed8ba22eea38f1df2"};
    let auth,db;
    try{firebase.initializeApp(firebaseConfig);auth=firebase.auth();db=firebase.database();}catch(e){}

    // Particles
    const bg=document.getElementById('bgWrap');
    for(let i=0;i<18;i++){
      const p=document.createElement('div');
      p.className='particle';
      const size=Math.random()*12+4;
      const hue=Math.floor(Math.random()*360);
      p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:-20px;background:hsla(${hue},70%,60%,0.4);animation-duration:${Math.random()*15+8}s;animation-delay:${Math.random()*8}s;`;
      bg.appendChild(p);
    }

    function switchTab(t){
      document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='register')));
      document.getElementById('loginPanel').classList.toggle('active',t==='login');
      document.getElementById('registerPanel').classList.toggle('active',t==='register');
    }
    function togglePwd(id,iconId){
      const inp=document.getElementById(id);const ic=document.getElementById(iconId);
      if(inp.type==='password'){inp.type='text';ic.className='fas fa-eye-slash input-icon';}
      else{inp.type='password';ic.className='fas fa-eye input-icon';}
      ic.onclick=()=>togglePwd(id,iconId);
    }
    function showErr(id,msg){const e=document.getElementById(id);e.querySelector('span').textContent=msg;e.style.display='flex';}
    function hideErr(id){document.getElementById(id).style.display='none';}
    function showOk(id,msg){const e=document.getElementById(id);e.querySelector('span').textContent=msg;e.style.display='flex';}

    async function doLogin(){
      hideErr('loginErr');
      const email=document.getElementById('loginEmail').value.trim();
      const pass=document.getElementById('loginPwd').value;
      if(!email||!pass){showErr('loginErr','Vui lòng điền đầy đủ thông tin!');return;}
      document.getElementById('loginBtn').innerHTML='<i class="fas fa-spinner spin" style="margin-right:8px;"></i>Đang đăng nhập...';
      document.getElementById('loginBtn').disabled=true;
      try{
        if(auth){
          const cred=await auth.signInWithEmailAndPassword(email,pass);
          const uid=cred.user.uid;
          const snap=await db.ref('users/'+uid).get();
          const ud=snap.val()||{};
          const user={uid,email:cred.user.email,name:ud.name||email.split('@')[0],balance:ud.balance||0,role:ud.role||'user'};
          localStorage.setItem('huanha_user',JSON.stringify(user));
          showOk('loginOk','Đăng nhập thành công! Đang chuyển trang...');
          setTimeout(()=>window.location.href='web.html',900);return;
        }
      }catch(e){}
      const users=JSON.parse(localStorage.getItem('huanha_users')||'[]');
      const found=users.find(u=>u.email===email||u.username===email);
      if(!found||found.password!==btoa(pass)){
        document.getElementById('loginBtn').innerHTML='<i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>Đăng Nhập';
        document.getElementById('loginBtn').disabled=false;
        showErr('loginErr','Email hoặc mật khẩu không đúng!');return;
      }
      const user={...found,password:undefined};
      localStorage.setItem('huanha_user',JSON.stringify(user));
      showOk('loginOk','Đăng nhập thành công! Đang chuyển trang...');
      setTimeout(()=>window.location.href='web.html',900);
    }

    async function doRegister(){
      hideErr('regErr');
      const name=document.getElementById('regName').value.trim();
      const email=document.getElementById('regEmail').value.trim();
      const pass=document.getElementById('regPwd').value;
      const conf=document.getElementById('regConfirm').value;
      if(!name||!email||!pass||!conf){showErr('regErr','Vui lòng điền đầy đủ thông tin!');return;}
      if(pass.length<6){showErr('regErr','Mật khẩu phải ít nhất 6 ký tự!');return;}
      if(pass!==conf){showErr('regErr','Mật khẩu xác nhận không khớp!');return;}
      document.getElementById('regBtn').innerHTML='<i class="fas fa-spinner spin" style="margin-right:8px;"></i>Đang đăng ký...';
      document.getElementById('regBtn').disabled=true;
      try{
        if(auth){
          const cred=await auth.createUserWithEmailAndPassword(email,pass);
          const uid=cred.user.uid;
          await db.ref('users/'+uid).set({name,email,balance:0,role:'user',createdAt:Date.now()});
          const user={uid,email,name,balance:0,role:'user'};
          localStorage.setItem('huanha_user',JSON.stringify(user));
          showOk('regOk','Đăng ký thành công!');
          setTimeout(()=>window.location.href='web.html',900);return;
        }
      }catch(e){}
      const users=JSON.parse(localStorage.getItem('huanha_users')||'[]');
      if(users.find(u=>u.email===email)){
        document.getElementById('regBtn').innerHTML='<i class="fas fa-user-plus" style="margin-right:8px;"></i>Đăng Ký Ngay';
        document.getElementById('regBtn').disabled=false;
        showErr('regErr','Email này đã được đăng ký!');return;
      }
      const uid='local_'+Date.now();
      const user={uid,name,email,password:btoa(pass),balance:0,role:'user'};
      users.push(user);
      localStorage.setItem('huanha_users',JSON.stringify(users));
      localStorage.setItem('huanha_user',JSON.stringify({...user,password:undefined}));
      showOk('regOk','Đăng ký thành công!');
      setTimeout(()=>window.location.href='web.html',900);
    }

    document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(document.getElementById('loginPanel').classList.contains('active'))doLogin();else doRegister();}});
    const u=JSON.parse(localStorage.getItem('huanha_user')||'null');
    if(u)window.location.href='web.html';
  </script>
</body>
</html>
