<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tài Khoản - Shophuanha.VN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Rubik',sans-serif;background:#f0f2f5;min-height:100vh;padding-bottom:30px;}
    @keyframes rainbow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes slideInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .header{background:rgba(255,255,255,0.98);backdrop-filter:blur(20px);padding:0 16px;height:56px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 16px rgba(0,0,0,0.08);position:sticky;top:0;z-index:100;border-bottom:1.5px solid rgba(0,0,0,0.06);}
    .back-btn{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#f5f5f5,#ececec);border:1.5px solid #e8e8e8;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;font-size:17px;transition:all 0.2s;}
    .back-btn:hover{background:linear-gradient(135deg,#e94560,#c0392b);color:#fff;border-color:#e94560;}
    .header-logo{font-family:'Righteous',cursive;font-size:18px;background:linear-gradient(90deg,#ff0080,#ff6a00,#ffd700,#00c853,#2196f3,#9c27b0,#ff0080);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:rainbow 3s ease infinite;}
    .content{padding:14px;}

    /* PROFILE HERO */
    .profile-hero{
      background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#0f3460);
      border-radius:20px;padding:24px 18px;margin-bottom:14px;
      position:relative;overflow:hidden;
      animation:slideInUp 0.4s ease;
    }
    .profile-hero::before{content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(233,69,96,0.12);}
    .profile-hero::after{content:'';position:absolute;left:-30px;bottom:-30px;width:120px;height:120px;border-radius:50%;background:rgba(33,150,243,0.1);}
    .profile-top{display:flex;align-items:center;gap:16px;position:relative;z-index:1;}
    .profile-avatar{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;border:3px solid rgba(255,255,255,0.2);box-shadow:0 4px 16px rgba(102,126,234,0.4);flex-shrink:0;}
    .profile-name{font-size:18px;font-weight:800;color:#fff;margin-bottom:3px;}
    .profile-email{font-size:12px;color:rgba(255,255,255,0.5);}
    .balance-bar{
      background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
      border-radius:14px;padding:14px 16px;margin-top:16px;
      display:flex;align-items:center;justify-content:space-between;
      position:relative;z-index:1;
    }
    .balance-label{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:4px;}
    .balance-amount{font-size:24px;font-weight:900;color:#ffd700;}
    .btn-deposit{
      background:linear-gradient(135deg,#00c853,#009624);
      color:#fff;border:none;padding:9px 18px;border-radius:12px;
      font-size:13px;font-weight:700;cursor:pointer;
      font-family:'Rubik',sans-serif;
      box-shadow:0 4px 14px rgba(0,200,83,0.35);
      text-decoration:none;display:inline-block;
      transition:all 0.2s;
    }
    .btn-deposit:hover{transform:scale(1.05);}

    /* CARDS */
    .card{background:#fff;border-radius:18px;box-shadow:0 2px 16px rgba(0,0,0,0.07);margin-bottom:12px;overflow:hidden;animation:slideInUp 0.4s ease both;}
    .card-hd{padding:14px 16px;border-bottom:1.5px solid #f5f5f5;display:flex;align-items:center;gap:10px;}
    .card-hd-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0;}
    .card-hd-title{font-size:15px;font-weight:700;color:#1a1a2e;}
    .form-group{padding:13px 16px;border-bottom:1px solid #f8f8f8;}
    .form-group:last-child{border-bottom:none;}
    .form-label{font-size:11px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px;display:block;}
    .form-input{width:100%;padding:11px 14px;border:2px solid #eef0f5;border-radius:12px;font-size:14px;font-family:'Rubik',sans-serif;outline:none;transition:all 0.2s;color:#333;background:#fafbff;}
    .form-input:focus{border-color:#e94560;background:#fff;box-shadow:0 0 0 3px rgba(233,69,96,0.07);}
    .btn-save{margin:14px 16px;width:calc(100% - 32px);padding:12px;background:linear-gradient(135deg,#e94560,#c0392b);color:#fff;border:none;border-radius:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Rubik',sans-serif;transition:all 0.2s;box-shadow:0 4px 14px rgba(233,69,96,0.3);}
    .btn-save:hover{opacity:0.92;}

    /* QUICK LINKS */
    .quick-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #f8f8f8;cursor:pointer;transition:all 0.2s;text-decoration:none;color:#333;}
    .quick-item:last-child{border-bottom:none;}
    .quick-item:hover{background:#f8f9ff;}
    .quick-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0;}
    .quick-info{flex:1;}
    .quick-name{font-size:14px;font-weight:700;color:#333;}
    .quick-desc{font-size:12px;color:#bbb;margin-top:2px;}
    .quick-arrow{color:#ddd;font-size:14px;}

    /* LOGOUT */
    .btn-logout{width:100%;padding:14px;background:#fff;color:#e94560;border:2px solid #e94560;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Rubik',sans-serif;margin-bottom:12px;transition:all 0.2s;}
    .btn-logout:hover{background:#e94560;color:#fff;}

    /* NOT LOGGED */
    .not-logged{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;text-align:center;}
    .not-logged-icon{font-size:72px;color:#e0e0e0;margin-bottom:20px;}
    .not-logged h2{font-size:20px;color:#666;margin-bottom:10px;}
    .not-logged p{font-size:14px;color:#bbb;margin-bottom:24px;}
    .btn-login-go{padding:14px 32px;background:linear-gradient(135deg,#e94560,#c0392b);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;box-shadow:0 6px 20px rgba(233,69,96,0.3);}

    /* TOAST */
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(30px);background:#1a1a2e;color:#fff;padding:11px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;transition:all 0.3s;opacity:0;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .toast.success{background:linear-gradient(135deg,#00c853,#009624);}
    .toast.error{background:linear-gradient(135deg,#e94560,#c0392b);}
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
    <span class="header-logo">Shophuanha.VN</span>
  </div>
  <div class="content" id="mainContent"></div>
  <div class="toast" id="toast"></div>
  <script>
    const firebaseConfig={apiKey: "AIzaSyCSC-b_f-F4WbjDaQIjrIwtvJdjawaccOk",
    authDomain: "aimlocksuperv2.firebaseapp.com",
    databaseURL: "https://aimlocksuperv2-default-rtdb.firebaseio.com",
    projectId: "aimlocksuperv2",
    storageBucket: "aimlocksuperv2.firebasestorage.app",
    messagingSenderId: "692606090999",
    appId: "1:692606090999:web:1444aed8ba22eea38f1df2"};
    let db;
    try{firebase.initializeApp(firebaseConfig);db=firebase.database();}catch(e){}
    const user=JSON.parse(localStorage.getItem('huanha_user')||'null');
    function fmt(n){return(n||0).toLocaleString('vi-VN');}

    function renderLoggedIn(){
      document.getElementById('mainContent').innerHTML=`
        <div class="profile-hero">
          <div class="profile-top">
            <div class="profile-avatar"><i class="fas fa-user"></i></div>
            <div>
              <div class="profile-name">${user.name||'Người Dùng'}</div>
              <div class="profile-email">${user.email}</div>
              <div style="margin-top:6px;"><span style="background:rgba(233,69,96,0.2);color:#ff8a9e;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">${user.role==='admin'?'🔰 ADMIN':'👤 Thành Viên'}</span></div>
            </div>
          </div>
          <div class="balance-bar">
            <div>
              <div class="balance-label">💰 Số Dư Ví</div>
              <div class="balance-amount" id="balAmt">${fmt(user.balance)}đ</div>
            </div>
            <a href="card.html" class="btn-deposit"><i class="fas fa-plus" style="margin-right:6px;"></i>Nạp Tiền</a>
          </div>
        </div>

        <div class="card" style="animation-delay:0.1s;">
          <div class="card-hd">
            <div class="card-hd-icon" style="background:linear-gradient(135deg,#667eea,#764ba2);"><i class="fas fa-user-edit"></i></div>
            <div class="card-hd-title">Thông Tin Cá Nhân</div>
          </div>
          <div class="form-group">
            <label class="form-label">Họ và Tên</label>
            <input type="text" class="form-input" id="editName" value="${user.name||''}" placeholder="Nhập tên"/>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="editEmail" value="${user.email||''}" placeholder="Nhập email"/>
          </div>
          <button class="btn-save" onclick="saveProfile()"><i class="fas fa-save" style="margin-right:8px;"></i>Lưu Thông Tin</button>
        </div>

        <div class="card" style="animation-delay:0.15s;">
          <div class="card-hd">
            <div class="card-hd-icon" style="background:linear-gradient(135deg,#e94560,#c0392b);"><i class="fas fa-lock"></i></div>
            <div class="card-hd-title">Đổi Mật Khẩu</div>
          </div>
          <div class="form-group">
            <label class="form-label">Mật Khẩu Hiện Tại</label>
            <input type="password" class="form-input" id="oldPwd" placeholder="Nhập mật khẩu cũ"/>
          </div>
          <div class="form-group">
            <label class="form-label">Mật Khẩu Mới</label>
            <input type="password" class="form-input" id="newPwd" placeholder="Mật khẩu mới"/>
          </div>
          <div class="form-group">
            <label class="form-label">Xác Nhận Mật Khẩu</label>
            <input type="password" class="form-input" id="confPwd" placeholder="Nhập lại mật khẩu mới"/>
          </div>
          <button class="btn-save" onclick="changePwd()" style="background:linear-gradient(135deg,#1a237e,#283593);"><i class="fas fa-key" style="margin-right:8px;"></i>Đổi Mật Khẩu</button>
        </div>

        <div class="card" style="animation-delay:0.2s;">
          <div class="card-hd">
            <div class="card-hd-icon" style="background:linear-gradient(135deg,#00c853,#009624);"><i class="fas fa-th-list"></i></div>
            <div class="card-hd-title">Truy Cập Nhanh</div>
          </div>
          <a href="history-orders.html" class="quick-item">
            <div class="quick-icon" style="background:linear-gradient(135deg,#9c27b0,#6a0080);"><i class="fas fa-shopping-bag"></i></div>
            <div class="quick-info"><div class="quick-name">Lịch Sử Mua Hàng</div><div class="quick-desc">Xem đơn hàng & key đã mua</div></div>
            <i class="fas fa-chevron-right quick-arrow"></i>
          </a>
          <a href="history-recharge.html" class="quick-item">
            <div class="quick-icon" style="background:linear-gradient(135deg,#00c853,#009624);"><i class="fas fa-coins"></i></div>
            <div class="quick-info"><div class="quick-name">Lịch Sử Nạp Tiền</div><div class="quick-desc">Lịch sử các lần nạp tiền</div></div>
            <i class="fas fa-chevron-right quick-arrow"></i>
          </a>
          <a href="card.html" class="quick-item">
            <div class="quick-icon" style="background:linear-gradient(135deg,#e94560,#c0392b);"><i class="fas fa-credit-card"></i></div>
            <div class="quick-info"><div class="quick-name">Nạp Thẻ Cào</div><div class="quick-desc">Viettel, Mobifone, Vinaphone...</div></div>
            <i class="fas fa-chevron-right quick-arrow"></i>
          </a>
          <a href="bank.html" class="quick-item">
            <div class="quick-icon" style="background:linear-gradient(135deg,#2196f3,#0066cc);"><i class="fas fa-university"></i></div>
            <div class="quick-info"><div class="quick-name">Chuyển Khoản Ngân Hàng</div><div class="quick-desc">Nạp qua chuyển khoản</div></div>
            <i class="fas fa-chevron-right quick-arrow"></i>
          </a>
        </div>

        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt" style="margin-right:8px;"></i>Đăng Xuất</button>
      `;
      // Sync balance
      if(db&&user.uid){
        db.ref('users/'+user.uid+'/balance').on('value',snap=>{
          const bal=snap.val()||0;user.balance=bal;
          localStorage.setItem('huanha_user',JSON.stringify(user));
          const el=document.getElementById('balAmt');if(el)el.textContent=fmt(bal)+'đ';
        });
      }
    }

    function renderNotLoggedIn(){
      document.getElementById('mainContent').innerHTML=`
        <div class="not-logged">
          <i class="fas fa-user-lock not-logged-icon"></i>
          <h2>Chưa Đăng Nhập</h2>
          <p>Đăng nhập để xem thông tin tài khoản và thực hiện giao dịch</p>
          <a href="login.html" class="btn-login-go"><i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>Đăng Nhập Ngay</a>
        </div>
      `;
    }

    function saveProfile(){
      const name=document.getElementById('editName').value.trim();
      const email=document.getElementById('editEmail').value.trim();
      if(!name||!email){showToast('Vui lòng điền đầy đủ!','error');return;}
      user.name=name;user.email=email;
      localStorage.setItem('huanha_user',JSON.stringify(user));
      if(db&&user.uid)db.ref('users/'+user.uid).update({name,email});
      showToast('Đã lưu thông tin!','success');
    }
    function changePwd(){
      const old=document.getElementById('oldPwd').value;
      const nw=document.getElementById('newPwd').value;
      const conf=document.getElementById('confPwd').value;
      if(!old||!nw||!conf){showToast('Vui lòng điền đầy đủ!','error');return;}
      if(nw.length<6){showToast('Mật khẩu mới phải ít nhất 6 ký tự!','error');return;}
      if(nw!==conf){showToast('Mật khẩu không khớp!','error');return;}
      const users=JSON.parse(localStorage.getItem('huanha_users')||'[]');
      const idx=users.findIndex(u=>u.uid===user.uid);
      if(idx!==-1){
        if(users[idx].password!==btoa(old)){showToast('Mật khẩu cũ không đúng!','error');return;}
        users[idx].password=btoa(nw);localStorage.setItem('huanha_users',JSON.stringify(users));
      }
      ['oldPwd','newPwd','confPwd'].forEach(id=>document.getElementById(id).value='');
      showToast('Đổi mật khẩu thành công!','success');
    }
    function logout(){localStorage.removeItem('huanha_user');showToast('Đã đăng xuất!','success');setTimeout(()=>window.location.href='web.html',800);}
    function showToast(msg,type=''){
      const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type?' '+type:'');
      setTimeout(()=>t.className='toast',2500);
    }
    if(user)renderLoggedIn();else renderNotLoggedIn();
  </script>
</body>
</html>
